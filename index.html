<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tinau Restaurant - Home</title>
  <link rel="stylesheet" href="style.css">
  <script src="script.js" defer></script>
</head>
<body>
 
  <header>
    <div class="logo-nav">
      <div class="logo-container">
        <img src="images/logo.jpeg" alt="Tinau Restaurant Logo" class="logo">
        <span class="restaurant-name">Tinau Restaurant</span>
      </div>
      <nav id="navbar">
        <ul>
          <li><a href="index.html">Home</a></li>
          <li><a href="gallery.html">Gallery</a></li>
          <li><a href="about.html">About Us</a></li>
          <li><a href="menu.html">Menu</a></li>
          <li><a href="reservation.html">Reservation</a></li>
          <li><a href="contact.html">Contact Us</a></li>
        </ul>
      </nav>
      <div class="hamburger" onclick="toggleMenu()">☰</div>
    </div>
  </header>

 
  <section class="hero hero-home">
    <div class="hero-content">
      <h1>Welcome to Tinau Restaurant</h1>
      <p>Quality Ingredients Is Our Promise.</p>
      <div class="hero-buttons">
        <button onclick="reserveTable()">Reserve Now</button>
        <button onclick="viewMenu()">View Menu</button>
      </div>
    </div>
  </section>

 
  <section class="food-showcase">
    <h2>Our Specialties</h2>
    <div class="food-gallery">
      <div class="food-item">
        <img src="images/momo.webp" alt="Steamed Dumplings (Momo)">
        <p>Steamed Dumplings (Momo)</p>
      </div>
      <div class="food-item">
        <img src="images/biryani.webp" alt="Chicken Biryani">
        <p>Chicken Biryani</p>
      </div>
      <div class="food-item">
        <img src="images/fried-chicken.webp" alt="Spicy Fried Chicken">
        <p>Spicy Fried Chicken</p>
      </div>
    </div>
  </section>

 
  <footer>
    <p>&copy; 2026 Tinau Restaurant</p>
  </footer>
</body>
</html>
