<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reservation - Tinau Restaurant</title>
  <link rel="stylesheet" href="style.css">
  <script src="script.js" defer></script>
</head>
<body>
  <!-- Header -->
  <header>
    <div class="logo-nav">
      <div class="logo-container">
        <img src="images/logo.jpeg" alt="Tinau Restaurant Logo" class="logo">
        <span class="restaurant-name">Tinau Restaurant</span>
      </div>
      <nav id="navbar">
        <ul>
          <li><a href="index.html">Home</a></li>
          <li><a href="gallery.html">Gallery</a></li>
          <li><a href="about.html">About Us</a></li>
          <li><a href="menu.html">Menu</a></li>
          <li><a href="reservation.html">Reservation</a></li>
          <li><a href="contact.html">Contact Us</a></li>
        </ul>
      </nav>
      <div class="hamburger" onclick="toggleMenu()">☰</div>
    </div>
  </header>

  <!-- Hero -->
  <section class="hero hero-reservation">
    <h1>Reserve Your Table</h1>
    <p>Book a table easily and enjoy your dining experience.</p>
  </section>

  <!-- Reservation Form -->
  <section>
    <h2 class="form-title">Reservation Form</h2>
    <form class="form">
      <label>Name:</label><input type="text" required><br>
      <label>Email:</label><input type="email" required><br>
      <label>Date:</label><input type="date" required><br>
      <label>Time:</label><input type="time" required><br>
      <label>Guests:</label><input type="number" min="1" required><br>
      <button type="submit">Book Table</button>
    </form>
  </section>

  <!-- Footer -->
  <footer>
    <p>&copy; 2026 Tinau Restaurant</p>
  </footer>
</body>
</html>
